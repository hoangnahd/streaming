services:
  app:
    build: .
    image: streaming-app:latest
    ports:
      - "8443:8443"
    env_file:
      - .env
    environment:
      JAVA_OPTS: "-Xms256m -Xmx512m"
    volumes:
      # Host directory holding keystore.p12 - mounted read-only, never baked
      # into the image itself
      - ./certs:/certs:ro
    restart: unless-stopped