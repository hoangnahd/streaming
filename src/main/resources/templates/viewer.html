<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Live Stream Viewer</title>
    <style>
        :root {
            --bg-primary: #0f111a;
            --bg-secondary: #1a1d2e;
            --bg-tertiary: #22263f;
            --accent: #00adb5;
            --accent-hover: #007a80;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
            --danger: #ff4a4a;
            --success: #4edf7a;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 20px 0;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .dashboard-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 20px;
            width: 100%;
            max-width: 1300px;
            /* Limits layout to the viewport minus padding */
            height: calc(100vh - 100px);
            min-height: 500px;
        }

        @media (max-width: 950px) {
            .dashboard-layout {
                grid-template-columns: 1fr;
                height: auto; /* Allow natural scrolling on small mobile screens */
            }
        }

        .main-panel {
            display: flex;
            flex-direction: column;
            gap: 15px;
            height: 100%;
        }

        .video-wrapper {
            width: 100%;
            background: #000000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7);
            border: 1px solid var(--bg-tertiary);
            /* Forces clean 16:9 cinematic scaling box */
            aspect-ratio: 16 / 9;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Preserves tracks without cropping or stretching */
        }

        .control-card {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--bg-tertiary);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-group label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            font-weight: bold;
        }

        .url-input-wrapper {
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--bg-tertiary);
            border-radius: 6px;
            padding: 12px;
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            transition: border 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent);
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        button:hover { background-color: var(--accent-hover); }
        button:active { transform: scale(0.98); }
        button:disabled {
            background-color: var(--bg-tertiary);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .sidebar-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            height: 100%; /* Force sidebar to match dashboard height */
            overflow: hidden; /* Prevent sidebar items from spilling out */
        }

        .telemetry-box {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--bg-tertiary);
            flex-shrink: 0; /* Stop the telemetry card from squishing */
        }

        .metric {
            font-size: 28px;
            font-weight: 700;
            color: var(--success);
            font-family: monospace;
            margin-top: 5px;
        }

        .terminal-box {
            background: #05070f;
            border-radius: 12px;
            border: 1px solid var(--bg-tertiary);
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Locks the header and container frame in place */
        }

        .terminal-header {
            background: #141724;
            padding: 12px 15px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            border-bottom: 1px solid var(--bg-tertiary);
            display: flex;
            justify-content: space-between;
            flex-shrink: 0; /* Keep header from shrinking */
        }

        /* The true inner logging chamber */
        .terminal-logs {
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            line-height: 1.6;
            overflow-y: auto; /* Creates the targeted scrollbar here */
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 6px;
            /* Custom scrollbar styling for a cleaner dark UI look */
            scrollbar-width: thin;
            scrollbar-color: var(--bg-tertiary) transparent;
        }

        /* Optional styling to make Chrome/Edge scrollbars match your dark theme */
        .terminal-logs::-webkit-scrollbar {
            width: 6px;
        }
        .terminal-logs::-webkit-scrollbar-track {
            background: transparent;
        }
        .terminal-logs::-webkit-scrollbar-thumb {
            background-color: var(--bg-tertiary);
            border-radius: 3px;
        }
    </style>
</head>
<body>

<h2>Live Video Stream Receiver</h2>

<div class="dashboard-layout">

    <div class="main-panel">
        <div class="video-wrapper">
            <video id="livePlayer" controls autoplay playsinline muted></video>
        </div>

        <div class="control-card">
            <div class="input-group">
                <label for="wsUrl">WebSocket Gateway Target Address</label>
                <div class="url-input-wrapper">
                    <input type="text" id="wsUrl" value="wss://localhost:8443/video-stream?role=viewer" placeholder="wss://...">
                    <button id="connectBtn">Connect Stream</button>
                </div>
            </div>
        </div>
    </div>

    <div class="sidebar-panel">
        <div class="telemetry-box">
            <div style="font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); font-weight: bold;">
                End-to-End Latency
            </div>
            <div id="latencyDisplay" class="metric">-- ms</div>
            <div id="statusText" style="margin-top: 8px; font-size: 13px; color: var(--text-muted);">Status: Idle</div>
        </div>

        <div class="terminal-box">
            <div class="terminal-header">
                <span>System Diagnostic Monitor</span>
                <span style="cursor: pointer; color: var(--accent);" onclick="clearLogs()">Clear</span>
            </div>
            <div id="terminalLogs" class="terminal-logs">
                <div class="log-entry info">System initialized. Awaiting secure proxy initialization loop...</div>
            </div>
        </div>
    </div>

</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const statusText = document.getElementById('statusText');
        const latencyDisplay = document.getElementById('latencyDisplay');
        const videoElement = document.getElementById('livePlayer');
        const terminalLogs = document.getElementById('terminalLogs');
        const wsUrlInput = document.getElementById('wsUrl');
        const connectBtn = document.getElementById('connectBtn');

        let socket;
        let mediaSource;
        let sourceBuffer;
        let queue = [];
        let currentStreamUrl = null;
        let reconnectTimer = null;
        let frameNum = 0;
        let pendingInitSegment = null;

        const RECONNECT_DELAY_MS = 2000;
        const MAX_BUFFER_BEHIND_SECONDS = 1.5;

        function log(message, type = 'info') {
            const entry = document.createElement('div');
            const timestamp = new Date().toISOString().split('T')[1].slice(0, 8);
            entry.className = `log-entry ${type}`;
            entry.innerText = `[${timestamp}] ${message}`;
            terminalLogs.appendChild(entry);
            terminalLogs.scrollTop = terminalLogs.scrollHeight;
        }

        // ── Register ONCE at startup ─────────────────────────────────────────────
        // Fires when browser stalls because currentTime hit a gap in the buffer.
        // Scans for buffered data ahead and jumps over the hole.
        videoElement.addEventListener('waiting', () => {
            if (!sourceBuffer || sourceBuffer.buffered.length === 0) return;

            for (let i = 0; i < sourceBuffer.buffered.length; i++) {
                if (sourceBuffer.buffered.start(i) > videoElement.currentTime + 0.1) {
                    const jumpTo = sourceBuffer.buffered.start(i) + 0.05;
                    log(`Gap detected — jumping to ${jumpTo.toFixed(2)}s`, "info");
                    videoElement.currentTime = jumpTo;
                    videoElement.play();
                    break;
                }
            }
        });
        // ────────────────────────────────────────────────────────────────────────

        function detectCodecs(initSegmentBytes) {
            const bytes = new Uint8Array(initSegmentBytes);
            const vp9Marker = [0x56, 0x50, 0x39];
            const vp8Marker = [0x56, 0x50, 0x38];
            for (let i = 0; i < bytes.length - 3; i++) {
                if (bytes[i] === vp9Marker[0] && bytes[i+1] === vp9Marker[1] && bytes[i+2] === vp9Marker[2]) {
                    return 'video/webm; codecs="vp9, opus"';
                }
                if (bytes[i] === vp8Marker[0] && bytes[i+1] === vp8Marker[1] && bytes[i+2] === vp8Marker[2]) {
                    return 'video/webm; codecs="vp8, opus"';
                }
            }
            return 'video/webm; codecs="vp9, opus"';
        }

        function onUpdateEnd() {
            if (!sourceBuffer || sourceBuffer.updating) return;

            // Drain the queue first
            if (queue.length > 0) {
                try {
                    safeAppend(queue.shift());
                } catch(e) {
                    log(`Queue drain error: ${e.message}`, "error");
                }
                return;
            }

            // Live edge chaser — only runs when queue is empty
            if (sourceBuffer.buffered.length === 0) return;

            const liveEdge = sourceBuffer.buffered.end(sourceBuffer.buffered.length - 1);
            const behind = liveEdge - videoElement.currentTime;

            if (behind > MAX_BUFFER_BEHIND_SECONDS) {
                log(`Live edge chase — jumping ${behind.toFixed(2)}s → ${(liveEdge - 0.1).toFixed(2)}s`, "info");
                videoElement.currentTime = liveEdge - 0.1;
            }
        }

        function createSourceBuffer(mimeType) {
            // Single place where SourceBuffer is created —
            // guarantees updateend is wired exactly once per SourceBuffer instance.
            sourceBuffer = mediaSource.addSourceBuffer(mimeType);
            sourceBuffer.addEventListener('updateend', onUpdateEnd);
            log(`SourceBuffer created: ${mimeType}`, "info");
        }

        function safeAppend(frame) {
            if (videoElement.error) {
                log(`Video element error (code: ${videoElement.error.code}) — resetting.`, "error");
                resetPipeline();
                queue.push(frame);
                return;
            }
            if (!mediaSource || mediaSource.readyState !== 'open' || !sourceBuffer || sourceBuffer.updating) {
                queue.push(frame);
                return;
            }
            try {
                sourceBuffer.appendBuffer(frame);
            } catch(e) {
                log(`Buffer append error: ${e.message}`, "error");
                resetPipeline();
                queue.push(frame);
            }
        }

        function initializeVideoPlayer() {
            if (mediaSource && mediaSource.readyState === 'open') {
                try { mediaSource.endOfStream(); } catch(e) { /* ignore */ }
            }

            mediaSource = new MediaSource();
            sourceBuffer = null;
            videoElement.src = URL.createObjectURL(mediaSource);

            mediaSource.addEventListener('sourceopen', () => {
                log("MediaSource pipeline ready.", "info");

                if (pendingInitSegment) {
                    try {
                        createSourceBuffer(pendingInitSegment.mimeType);
                        safeAppend(pendingInitSegment.data);
                        pendingInitSegment = null;
                    } catch(e) {
                        log(`Failed to create SourceBuffer: ${e.message}`, "error");
                    }
                }
            });
        }

        function resetPipeline() {
            if (reconnectTimer) {
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            }
            pendingInitSegment = null;
            queue = [];
            videoElement.pause();
            videoElement.removeAttribute('src');
            videoElement.load();
            initializeVideoPlayer();
        }

        function initViewer() {
            const targetUrl = wsUrlInput.value.trim();
            if (!targetUrl) {
                log("No endpoint URL provided.", "error");
                return;
            }
            statusText.innerText = "Status: Initializing...";
            wsUrlInput.disabled = true;
            connectBtn.disabled = true;
            log("Initializing media pipeline...", "info");
            initializeVideoPlayer();
            connectWebSocket(targetUrl);
        }

        function connectWebSocket(url) {
            currentStreamUrl = url;
            log(`Connecting to: ${url}`, "info");

            try {
                socket = new WebSocket(url);
                socket.binaryType = 'arraybuffer';
            } catch(e) {
                log(`Connection failed: ${e.message}`, "error");
                resetUI();
                return;
            }

            socket.onopen = () => {
                statusText.innerText = "Status: Streaming Live";
                statusText.style.color = "var(--success)";
                log("Connected. Awaiting stream...", "success");
                if (reconnectTimer) {
                    clearTimeout(reconnectTimer);
                    reconnectTimer = null;
                }
            };

            socket.onmessage = (event) => {
                const packet = event.data;

                if (typeof packet === "string") {
                    try {
                        const signal = JSON.parse(packet);
                        if (signal.event === "STREAM_RESTARTED") {
                            log("Server signal: camera reconnected — resetting pipeline.", "info");
                            resetPipeline();
                        }
                    } catch(e) {
                        log(`Malformed signal received: ${e.message}`, "error");
                    }
                    return;
                }

                frameNum++;
                if (packet.byteLength < 8) return;

                const view = new DataView(packet);
                let captureTimestamp = view.getFloat64(0);
                if (captureTimestamp < 1000000000000) captureTimestamp *= 1000;
                latencyDisplay.innerText = `${Date.now() - captureTimestamp} ms`;

                const cleanVideoFrame = packet.slice(8);

                const headerBytes = new Uint8Array(cleanVideoFrame, 0, 4);
                const isWebMHeader = headerBytes[0] === 0x1A &&
                                    headerBytes[1] === 0x45 &&
                                    headerBytes[2] === 0xDF &&
                                    headerBytes[3] === 0xA3;

                if (isWebMHeader) {
                    if (sourceBuffer && videoElement.currentTime > 0) {
                        log("New WebM header mid-session — resetting pipeline.", "info");
                        resetPipeline();
                    }

                    const mimeType = detectCodecs(cleanVideoFrame);
                    log(`Detected codec: ${mimeType}`, "info");

                    if (sourceBuffer) {
                        safeAppend(cleanVideoFrame);
                    } else if (mediaSource && mediaSource.readyState === 'open') {
                        try {
                            createSourceBuffer(mimeType); // ← always use helper
                            safeAppend(cleanVideoFrame);
                        } catch(e) {
                            log(`Failed to create SourceBuffer: ${e.message}`, "error");
                        }
                    } else {
                        log("sourceopen not yet fired — queuing init segment.", "info");
                        pendingInitSegment = { data: cleanVideoFrame, mimeType };
                    }
                    return;
                }

                safeAppend(cleanVideoFrame);
            };

            socket.onclose = (event) => {
                statusText.innerText = "Status: Reconnecting...";
                statusText.style.color = "var(--warning)";
                log(`Connection closed (code: ${event.code}) — retrying in ${RECONNECT_DELAY_MS}ms...`, "error");
                if (reconnectTimer) clearTimeout(reconnectTimer);
                reconnectTimer = setTimeout(() => {
                    log("Reconnecting...", "info");
                    resetPipeline();
                    connectWebSocket(currentStreamUrl);
                }, RECONNECT_DELAY_MS);
            };

            socket.onerror = () => {
                log("WebSocket error.", "error");
            };
        }

        function resetUI() {
            wsUrlInput.disabled = false;
            connectBtn.disabled = false;
            latencyDisplay.innerText = "-- ms";
            latencyDisplay.style.color = "var(--text-muted)";
        }

        document.getElementById('connectBtn').addEventListener('click', initViewer);
    });
</script>
</body>
</html>
