<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Subtle custom animations for a polished UX */
        @keyframes fade-in-up {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up {
            animation: fade-in-up 0.4s ease-out forwards;
        }
    </style>
</head>
<body class="min-h-screen bg-gray-900 flex items-center justify-center p-4 font-sans text-gray-200 selection:bg-blue-500/30">

    <div class="w-full max-w-md animate-fade-in-up"
     th:with="isSecurityError=${param.error != null}">

        <div class="bg-gray-800/80 backdrop-blur border border-gray-700 rounded-2xl shadow-2xl p-8">
            
            <form th:action="@{/login}" th:object="${loginForm}" method="post" class="space-y-6">
                
                <div th:if="${isSecurityError}" class="bg-red-500/10 border border-red-500/30 flex items-start gap-3 p-3 rounded-lg">
                    <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <p class="text-sm text-red-400 font-medium">Invalid username or password.</p>
                </div>

                <div class="space-y-1.5">
                    <label for="username" class="block text-sm font-medium text-gray-300">Username</label>
                    <input type="text" id="username" name="username" th:field="*{username}" placeholder="Enter your username"
                        class="w-full bg-gray-900/50 border rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 transition-all duration-200"
                        th:classappend="${#fields.hasErrors('username') or isSecurityError} ? 'border-red-500/50 focus:border-red-500 focus:ring-red-500/20' : 'border-gray-700 focus:border-blue-500 focus:ring-blue-500/20'" />
                    <p th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-xs text-red-400 mt-1"></p>
                </div>

                <div class="space-y-1.5">
                    <label for="password" class="block text-sm font-medium text-gray-300">Password</label>
                    <input type="password" id="password" name="password" th:field="*{password}" placeholder="••••••••"
                        class="w-full bg-gray-900/50 border rounded-lg px-4 py-2.5 text-white placeholder-gray-500 focus:outline-none focus:ring-2 transition-all duration-200"
                        th:classappend="${#fields.hasErrors('password') or isSecurityError} ? 'border-red-500/50 focus:border-red-500 focus:ring-red-500/20' : 'border-gray-700 focus:border-blue-500 focus:ring-blue-500/20'" />
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}" class="text-xs text-red-400 mt-1"></p>
                </div>

                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-2.5 px-4 rounded-lg transition-all duration-200">
                    Sign In
                </button>
            </form>
        </div>
    </div>

</body>
</html>
